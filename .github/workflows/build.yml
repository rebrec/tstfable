name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build du fichier HTML unique
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build (typecheck + bundle Vite single-file)
        run: npm run build

      - name: Vérifier que le HTML est autonome
        run: |
          test -f dist/index.html
          if grep -E '(src|href)="https?://' dist/index.html; then
            echo "::error::dist/index.html référence des ressources externes"
            exit 1
          fi
          echo "Taille du fichier : $(du -h dist/index.html | cut -f1)"

      - name: Publier l'artefact (jeu complet en un fichier)
        uses: actions/upload-artifact@v4
        with:
          name: game-html
          path: dist/index.html

      - name: Préparer l'artefact GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Déployer sur GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
